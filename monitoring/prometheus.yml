global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "backend"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "server:15000"

  - job_name: "node-exporter"
    static_configs:
      - targets:
          - "node-exporter:9100"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/alerts.yml